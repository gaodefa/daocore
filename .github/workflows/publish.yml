name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Install & Build
        run: |
          corepack enable
          pnpm install
          pnpm build
      - name: Publish to npm as daocore
        run: |
          # Workspace needs root package named openclaw; npm needs it as daocore
          cp package.json package.json.bak
          node -e "const p=require('./package.json');p.name='@gaodefa/daocore';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish
          mv package.json.bak package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
